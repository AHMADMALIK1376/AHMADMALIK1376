<svg viewBox="0 0 500 340" xmlns="http://www.w3.org/2000/svg" width="500" height="340">
<defs>
  <style>
    /* Donut segments drawn via stroke-dasharray on a circle r=100, circumference≈628 */
    .seg { fill: none; stroke-width: 42; transform-origin: center;
           stroke-linecap: butt;
           animation: spinIn 1.6s cubic-bezier(.22,.61,.36,1) both; }
    @keyframes spinIn {
      from { stroke-dashoffset: 628; opacity:0; }
      to   { opacity:1; }
    }
    .seg1 { stroke: #00ff88; animation-delay:0.0s; filter: drop-shadow(0 0 8px #00ff88aa); }
    .seg2 { stroke: #a855f7; animation-delay:0.2s; filter: drop-shadow(0 0 8px #a855f7aa); }
    .seg3 { stroke: #38bdf8; animation-delay:0.4s; filter: drop-shadow(0 0 8px #38bdf8aa); }
    .seg4 { stroke: #fbbf24; animation-delay:0.6s; filter: drop-shadow(0 0 8px #fbbf24aa); }
    .seg5 { stroke: #f87171; animation-delay:0.8s; filter: drop-shadow(0 0 8px #f87171aa); }
    .seg6 { stroke: #34d399; animation-delay:1.0s; filter: drop-shadow(0 0 8px #34d399aa); }
    .center-pulse { animation: pulse 2.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    .label-fade { animation: fadeIn 2s ease both; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  </style>
  <!-- Glow filter -->
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="500" height="340" fill="#0d1117" rx="12"/>

<!-- Title -->
<text x="250" y="22" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11" letter-spacing="4">◈ LANGUAGE DISTRIBUTION ◈</text>

<!-- Donut chart centered at 165,175, r=100, circumference=628.3 -->
<!-- Segments: Python 42% (264), TS 22% (138), JS 14% (88), Other 10% (63), Java 7% (44), C++ 5% (31) -->
<!-- Each segment: dasharray="slice gap", rotate to correct start angle -->

<!-- Python 42% = 264px. Start=0° (top = -90°), so rotate -90 -->
<circle class="seg seg1" cx="165" cy="175" r="100"
  stroke-dasharray="260 368"
  transform="rotate(-90 165 175)"/>

<!-- TypeScript 22% = 138px. Start after Python (264px = 151.2°) -->
<circle class="seg seg2" cx="165" cy="175" r="100"
  stroke-dasharray="136 492"
  transform="rotate(61.2 165 175)"/>

<!-- JavaScript 14% = 88px. Start after TS (264+138=402px = 230.4°) -->
<circle class="seg seg3" cx="165" cy="175" r="100"
  stroke-dasharray="86 542"
  transform="rotate(143.4 165 175)"/>

<!-- Other langs 10% = 63px. Start=490px=280.8° -->
<circle class="seg seg4" cx="165" cy="175" r="100"
  stroke-dasharray="61 567"
  transform="rotate(191.4 165 175)"/>

<!-- Java 7% = 44px. Start=553px=316.8° -->
<circle class="seg seg5" cx="165" cy="175" r="100"
  stroke-dasharray="42 586"
  transform="rotate(226.8 165 175)"/>

<!-- C++ 5% = 31px. Start=597px=342° -->
<circle class="seg seg6" cx="165" cy="175" r="100"
  stroke-dasharray="29 599"
  transform="rotate(252 165 175)"/>

<!-- Center circle overlay (donut hole) -->
<circle cx="165" cy="175" r="72" fill="#0d1117"/>
<!-- Center label -->
<text x="165" y="168" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="13" font-weight="bold" class="center-pulse">STACK</text>
<text x="165" y="184" text-anchor="middle" fill="#4b5563" font-family="monospace" font-size="9">DISTRIBUTION</text>

<!-- Legend — right side -->
<g class="label-fade">
  <!-- Python -->
  <circle cx="298" cy="80"  r="7" fill="#00ff88" filter="url(#glow)"/>
  <text x="312" y="84"  fill="#e5e7eb" font-family="monospace" font-size="11">Python</text>
  <text x="460" y="84"  text-anchor="end" fill="#00ff88" font-family="monospace" font-size="11" font-weight="bold">42%</text>
  <rect x="298" y="89" width="162" height="3" fill="#1f2937" rx="1"/>
  <rect x="298" y="89" width="68"  height="3" fill="#00ff88" rx="1"/>

  <!-- TypeScript -->
  <circle cx="298" cy="118" r="7" fill="#a855f7" filter="url(#glow)"/>
  <text x="312" y="122" fill="#e5e7eb" font-family="monospace" font-size="11">TypeScript</text>
  <text x="460" y="122" text-anchor="end" fill="#a855f7" font-family="monospace" font-size="11" font-weight="bold">22%</text>
  <rect x="298" y="127" width="162" height="3" fill="#1f2937" rx="1"/>
  <rect x="298" y="127" width="36"  height="3" fill="#a855f7" rx="1"/>

  <!-- JavaScript -->
  <circle cx="298" cy="156" r="7" fill="#38bdf8" filter="url(#glow)"/>
  <text x="312" y="160" fill="#e5e7eb" font-family="monospace" font-size="11">JavaScript</text>
  <text x="460" y="160" text-anchor="end" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold">14%</text>
  <rect x="298" y="165" width="162" height="3" fill="#1f2937" rx="1"/>
  <rect x="298" y="165" width="23"  height="3" fill="#38bdf8" rx="1"/>

  <!-- Other -->
  <circle cx="298" cy="194" r="7" fill="#fbbf24" filter="url(#glow)"/>
  <text x="312" y="198" fill="#e5e7eb" font-family="monospace" font-size="11">Other</text>
  <text x="460" y="198" text-anchor="end" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">10%</text>
  <rect x="298" y="203" width="162" height="3" fill="#1f2937" rx="1"/>
  <rect x="298" y="203" width="16"  height="3" fill="#fbbf24" rx="1"/>

  <!-- Java -->
  <circle cx="298" cy="232" r="7" fill="#f87171" filter="url(#glow)"/>
  <text x="312" y="236" fill="#e5e7eb" font-family="monospace" font-size="11">Java</text>
  <text x="460" y="236" text-anchor="end" fill="#f87171" font-family="monospace" font-size="11" font-weight="bold">7%</text>
  <rect x="298" y="241" width="162" height="3" fill="#1f2937" rx="1"/>
  <rect x="298" y="241" width="11"  height="3" fill="#f87171" rx="1"/>

  <!-- C++ -->
  <circle cx="298" cy="270" r="7" fill="#34d399" filter="url(#glow)"/>
  <text x="312" y="274" fill="#e5e7eb" font-family="monospace" font-size="11">C++</text>
  <text x="460" y="274" text-anchor="end" fill="#34d399" font-family="monospace" font-size="11" font-weight="bold">5%</text>
  <rect x="298" y="279" width="162" height="3" fill="#1f2937" rx="1"/>
  <rect x="298" y="279" width="8"   height="3" fill="#34d399" rx="1"/>
</g>

<!-- Bottom label -->
<text x="165" y="315" text-anchor="middle" fill="#374151" font-family="monospace" font-size="8">auto-updated daily · github.com/AHMADMALIK1376</text>
</svg>
