<svg viewBox="0 0 520 380" xmlns="http://www.w3.org/2000/svg" width="520" height="380">
<defs>
  <style>
    @keyframes fillBar {
      from { width: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.5; }
    }
    .card { animation: fadeUp 0.8s ease both; }
    .c1 { animation-delay: 0.1s; }
    .c2 { animation-delay: 0.3s; }
    .c3 { animation-delay: 0.5s; }
    .c4 { animation-delay: 0.7s; }
    .bar-fill { animation: fillBar 1.5s ease-out both; }
    .b1 { animation-delay: 0.3s; }
    .b2 { animation-delay: 0.5s; }
    .b3 { animation-delay: 0.7s; }
    .b4 { animation-delay: 0.9s; }
    .dot { animation: pulse 2s ease-in-out infinite; }
  </style>
  <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#0088cc"/>
  </linearGradient>
  <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffd700"/>
    <stop offset="100%" stop-color="#cc9900"/>
  </linearGradient>
  <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff6b6b"/>
    <stop offset="100%" stop-color="#cc3333"/>
  </linearGradient>
  <filter id="shadow">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
  </filter>
</defs>

<!-- Background -->
<rect width="520" height="380" fill="#0d1117" rx="14"/>

<!-- Title -->
<text x="260" y="32" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">📊 Project Progress</text>
<text x="260" y="52" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">active development modules</text>

<!-- ============================================ -->
<!-- CARD 1: AI Detection Engine — 87%            -->
<!-- ============================================ -->
<g class="card c1">
  <rect x="30" y="70" width="460" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Icon circle -->
  <circle cx="55" cy="99" r="16" fill="#0d1117" stroke="#00d4ff" stroke-width="2"/>
  <text x="55" y="104" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="14">🤖</text>
  
  <!-- Project Name -->
  <text x="82" y="95" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold">AI Detection Engine</text>
  <text x="82" y="110" fill="#6b7280" font-family="monospace" font-size="9">PID 001 · Python · LLM Vision · Voting Algo</text>
  
  <!-- Percentage -->
  <text x="470" y="95" text-anchor="end" fill="#00d4ff" font-family="monospace" font-size="14" font-weight="bold">87%</text>
  
  <!-- Progress Bar Background -->
  <rect x="82" y="118" width="380" height="6" rx="3" fill="#1f2937"/>
  <!-- Progress Bar Fill -->
  <rect x="82" y="118" width="331" height="6" rx="3" fill="url(#bg1)" class="bar-fill b1"/>
</g>

<!-- ============================================ -->
<!-- CARD 2: Browser Automation — 100%            -->
<!-- ============================================ -->
<g class="card c2">
  <rect x="30" y="140" width="460" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  
  <circle cx="55" cy="169" r="16" fill="#0d1117" stroke="#a78bfa" stroke-width="2"/>
  <text x="55" y="174" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="14">🌐</text>
  
  <text x="82" y="165" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold">Browser Automation</text>
  <text x="82" y="180" fill="#6b7280" font-family="monospace" font-size="9">PID 002 · Playwright · BS4 · Node.js</text>
  
  <text x="470" y="165" text-anchor="end" fill="#a78bfa" font-family="monospace" font-size="14" font-weight="bold">100%</text>
  
  <rect x="82" y="188" width="380" height="6" rx="3" fill="#1f2937"/>
  <rect x="82" y="188" width="380" height="6" rx="3" fill="url(#bg2)" class="bar-fill b2"/>
</g>

<!-- ============================================ -->
<!-- CARD 3: VS Code Extension — 65%              -->
<!-- ============================================ -->
<g class="card c3">
  <rect x="30" y="210" width="460" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  
  <circle cx="55" cy="239" r="16" fill="#0d1117" stroke="#ffd700" stroke-width="2"/>
  <text x="55" y="244" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="14">💻</text>
  
  <text x="82" y="235" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold">VS Code Extension</text>
  <text x="82" y="250" fill="#6b7280" font-family="monospace" font-size="9">PID 003 · TypeScript · Canvas API · Diagnostics</text>
  
  <text x="470" y="235" text-anchor="end" fill="#ffd700" font-family="monospace" font-size="14" font-weight="bold">65%</text>
  
  <rect x="82" y="258" width="380" height="6" rx="3" fill="#1f2937"/>
  <rect x="82" y="258" width="247" height="6" rx="3" fill="url(#bg3)" class="bar-fill b3"/>
</g>

<!-- ============================================ -->
<!-- CARD 4: Cloud SaaS Platform — 55%            -->
<!-- ============================================ -->
<g class="card c4">
  <rect x="30" y="280" width="460" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  
  <circle cx="55" cy="309" r="16" fill="#0d1117" stroke="#ff6b6b" stroke-width="2"/>
  <text x="55" y="314" text-anchor="middle" fill="#ff6b6b" font-family="monospace" font-size="14">☁️</text>
  
  <text x="82" y="305" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold">Cloud SaaS Platform</text>
  <text x="82" y="320" fill="#6b7280" font-family="monospace" font-size="9">PID 004 · GCP · AWS · Docker · CI/CD</text>
  
  <text x="470" y="305" text-anchor="end" fill="#ff6b6b" font-family="monospace" font-size="14" font-weight="bold">55%</text>
  
  <rect x="82" y="328" width="380" height="6" rx="3" fill="#1f2937"/>
  <rect x="82" y="328" width="209" height="6" rx="3" fill="url(#bg4)" class="bar-fill b4"/>
</g>

<!-- Footer -->
<text x="260" y="370" text-anchor="middle" fill="#374151" font-family="monospace" font-size="8">github.com/AHMADMALIK1376 · auto-synced</text>

</svg>
