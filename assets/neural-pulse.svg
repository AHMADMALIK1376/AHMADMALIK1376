<svg viewBox="0 0 760 285" xmlns="http://www.w3.org/2000/svg" width="760" height="285">
<defs>
<style>
.nd{animation:nd 2.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.nd2{animation:nd 2.2s ease-in-out -.6s infinite;transform-box:fill-box;transform-origin:center}
.nd3{animation:nd 2.2s ease-in-out -1.2s infinite;transform-box:fill-box;transform-origin:center}
.nd4{animation:nd 2.2s ease-in-out -1.8s infinite;transform-box:fill-box;transform-origin:center}
@keyframes nd{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.65}}
.pl{stroke-dasharray:11 600;fill:none;stroke-width:2}
@keyframes pg{0%{stroke-dashoffset:225;opacity:0}5%{opacity:1}88%{opacity:1}100%{stroke-dashoffset:-14;opacity:0}}
@keyframes pp{0%{stroke-dashoffset:230;opacity:0}5%{opacity:1}88%{opacity:1}100%{stroke-dashoffset:-14;opacity:0}}
@keyframes pb{0%{stroke-dashoffset:230;opacity:0}5%{opacity:1}88%{opacity:1}100%{stroke-dashoffset:-14;opacity:0}}
@keyframes py{0%{stroke-dashoffset:175;opacity:0}5%{opacity:1}88%{opacity:1}100%{stroke-dashoffset:-14;opacity:0}}
.pg{stroke:#00ff88;animation:pg var(--d,2.5s) var(--del,0s) ease-in-out infinite}
.pp{stroke:#a855f7;animation:pp var(--d,2.7s) var(--del,0s) ease-in-out infinite}
.pb{stroke:#38bdf8;animation:pb var(--d,2.6s) var(--del,0s) ease-in-out infinite}
.py{stroke:#fbbf24;animation:py var(--d,2.3s) var(--del,0s) ease-in-out infinite}
.lbl{font-family:monospace;font-size:9px;text-anchor:middle;letter-spacing:2}
.ttl{animation:tp 3.5s ease-in-out infinite}
@keyframes tp{0%,70%,100%{opacity:1}80%{opacity:.25}85%{opacity:.9}90%{opacity:.2}95%{opacity:1}}
.proc{animation:pr 1.1s step-end infinite}
@keyframes pr{0%,100%{opacity:1}50%{opacity:0}}
</style>
<filter id="gn" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="3.5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="gs" x="-40%" y="-40%" width="180%" height="180%">
  <feGaussianBlur stdDeviation="2" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect width="760" height="285" fill="#0d1117" rx="12"/>

<text x="380" y="22" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11" letter-spacing="4" class="ttl">◈  NEURAL  PULSE  NETWORK  ◈</text>
<text x="700" y="22" text-anchor="end" fill="#00ff88" font-family="monospace" font-size="8" class="proc">▌PROCESSING...</text>

