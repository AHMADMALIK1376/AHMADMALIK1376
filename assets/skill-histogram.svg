<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" width="760" height="320">
<defs>
  <style>
    .bar { animation: growUp 1.4s cubic-bezier(.22,.61,.36,1) both; transform-origin: bottom; }
    .bar:nth-child(1)  { animation-delay: 0.05s; }
    .bar:nth-child(2)  { animation-delay: 0.12s; }
    .bar:nth-child(3)  { animation-delay: 0.19s; }
    .bar:nth-child(4)  { animation-delay: 0.26s; }
    .bar:nth-child(5)  { animation-delay: 0.33s; }
    .bar:nth-child(6)  { animation-delay: 0.40s; }
    .bar:nth-child(7)  { animation-delay: 0.47s; }
    .bar:nth-child(8)  { animation-delay: 0.54s; }
    .bar:nth-child(9)  { animation-delay: 0.61s; }
    .bar:nth-child(10) { animation-delay: 0.68s; }
    @keyframes growUp {
      from { transform: scaleY(0); opacity: 0; }
      to   { transform: scaleY(1); opacity: 1; }
    }
    .glow-g { filter: drop-shadow(0 0 6px #00ff88cc); }
    .glow-p { filter: drop-shadow(0 0 6px #a855f7cc); }
    .glow-b { filter: drop-shadow(0 0 6px #38bdf8cc); }
    .glow-y { filter: drop-shadow(0 0 6px #fbbf24cc); }
    .glow-r { filter: drop-shadow(0 0 6px #f87171cc); }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.55; }
    }
    .scanline {
      animation: scan 3s linear infinite;
    }
    @keyframes scan {
      0%   { transform: translateY(0); opacity:.18; }
      100% { transform: translateY(320px); opacity:.05; }
    }
  </style>
  <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00ff88"/>
    <stop offset="100%" stop-color="#00cc66" stop-opacity=".6"/>
  </linearGradient>
  <linearGradient id="gp" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#a855f7"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity=".6"/>
  </linearGradient>
  <linearGradient id="gb" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#38bdf8"/>
    <stop offset="100%" stop-color="#0284c7" stop-opacity=".6"/>
  </linearGradient>
  <linearGradient id="gy" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fbbf24"/>
    <stop offset="100%" stop-color="#d97706" stop-opacity=".6"/>
  </linearGradient>
  <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f87171"/>
    <stop offset="100%" stop-color="#dc2626" stop-opacity=".6"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="760" height="320" fill="#0d1117" rx="12"/>
<!-- Subtle grid -->
<line x1="60" y1="40" x2="60" y2="260" stroke="#1f2937" stroke-width=".5"/>
<line x1="60" y1="260" x2="730" y2="260" stroke="#1f2937" stroke-width=".5"/>
<line x1="60" y1="208" x2="730" y2="208" stroke="#1f2937" stroke-width=".3" stroke-dasharray="4,4"/>
<line x1="60" y1="156" x2="730" y2="156" stroke="#1f2937" stroke-width=".3" stroke-dasharray="4,4"/>
<line x1="60" y1="104" x2="730" y2="104" stroke="#1f2937" stroke-width=".3" stroke-dasharray="4,4"/>
<line x1="60" y1="52"  x2="730" y2="52"  stroke="#1f2937" stroke-width=".3" stroke-dasharray="4,4"/>

<!-- Y labels -->
<text x="50" y="264" text-anchor="end" fill="#4b5563" font-family="monospace" font-size="9">0</text>
<text x="50" y="212" text-anchor="end" fill="#4b5563" font-family="monospace" font-size="9">25</text>
<text x="50" y="160" text-anchor="end" fill="#4b5563" font-family="monospace" font-size="9">50</text>
<text x="50" y="108" text-anchor="end" fill="#4b5563" font-family="monospace" font-size="9">75</text>
<text x="50" y="56"  text-anchor="end" fill="#4b5563" font-family="monospace" font-size="9">100</text>

<!-- Title -->
<text x="395" y="22" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="12" letter-spacing="4" class="pulse">◈ NEURAL SKILL HISTOGRAM ◈</text>

<!-- BAR GROUP 1 — Python 100% → h=208 -->
<g class="bar glow-g">
  <rect x="72"  y="52"  width="46" height="208" fill="url(#gg)" rx="4"/>
</g>
<text x="95"  y="275" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9">Python</text>
<text x="95"  y="48"  text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9" font-weight="bold">100%</text>

