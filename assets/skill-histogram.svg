<!-- BAR GROUP 7 — React 80% -->
<g class="bar glow-b">
  <rect x="420" y="94"  width="46" height="166" fill="url(#gb)" rx="4" opacity=".7"/>
</g>
<text x="443" y="275" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="9">React</text>
