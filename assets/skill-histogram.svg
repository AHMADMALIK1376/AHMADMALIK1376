</g>
<text x="617" y="275" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9">Java / C++</text>
<text x="617" y="142" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9" font-weight="bold">55%</text>

<!-- Legend -->
<rect x="65"  y="292" width="8" height="8" fill="#00ff88" rx="1"/>
<text x="76"  y="300" fill="#6b7280" font-family="monospace" font-size="8">S-RANK</text>
