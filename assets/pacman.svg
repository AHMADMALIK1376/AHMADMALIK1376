<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" width="760" height="200">
<defs>
<style>
@keyframes pac{0%{transform:translate(-22px,100px)}100%{transform:translate(782px,100px)}}
.pg{animation:pac 8s linear infinite}

@keyframes cu{from{transform:rotate(-28deg)}to{transform:rotate(0deg)}}
@keyframes cd{from{transform:rotate(28deg)}to{transform:rotate(0deg)}}
.mu{transform-box:fill-box;transform-origin:0% 100%;animation:cu .2s ease-in-out infinite alternate}
.md{transform-box:fill-box;transform-origin:0% 0%;animation:cd .2s ease-in-out infinite alternate}

@keyframes g1{0%{transform:translate(-62px,100px)}100%{transform:translate(742px,100px)}}
@keyframes g2{0%{transform:translate(-102px,100px)}100%{transform:translate(702px,100px)}}
@keyframes g3{0%{transform:translate(-142px,100px)}100%{transform:translate(662px,100px)}}
@keyframes g4{0%{transform:translate(-182px,100px)}100%{transform:translate(622px,100px)}}
.ga{animation:g1 8s linear infinite}
.gb{animation:g2 8s linear infinite}
.gc{animation:g3 8s linear infinite}
.gd{animation:g4 8s linear infinite}

@keyframes wb{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.gw{animation:wb .45s ease-in-out infinite}

@keyframes e0 {0%,6%{opacity:1}7%,99%{opacity:0}100%{opacity:1}}
@keyframes e1 {0%,9%{opacity:1}10%,99%{opacity:0}100%{opacity:1}}
@keyframes e2 {0%,12%{opacity:1}13%,99%{opacity:0}100%{opacity:1}}
@keyframes e3 {0%,15%{opacity:1}16%,99%{opacity:0}100%{opacity:1}}
@keyframes e4 {0%,18%{opacity:1}19%,99%{opacity:0}100%{opacity:1}}
@keyframes e5 {0%,20%{opacity:1}21%,99%{opacity:0}100%{opacity:1}}
@keyframes e6 {0%,23%{opacity:1}24%,99%{opacity:0}100%{opacity:1}}
@keyframes e7 {0%,26%{opacity:1}27%,99%{opacity:0}100%{opacity:1}}
@keyframes e8 {0%,29%{opacity:1}30%,99%{opacity:0}100%{opacity:1}}
@keyframes e9 {0%,32%{opacity:1}33%,99%{opacity:0}100%{opacity:1}}
@keyframes e10{0%,35%{opacity:1}36%,99%{opacity:0}100%{opacity:1}}
@keyframes e11{0%,38%{opacity:1}39%,99%{opacity:0}100%{opacity:1}}
@keyframes e12{0%,41%{opacity:1}42%,99%{opacity:0}100%{opacity:1}}
@keyframes e13{0%,43%{opacity:1}44%,99%{opacity:0}100%{opacity:1}}
@keyframes e14{0%,46%{opacity:1}47%,99%{opacity:0}100%{opacity:1}}
@keyframes e15{0%,49%{opacity:1}50%,99%{opacity:0}100%{opacity:1}}
@keyframes e16{0%,52%{opacity:1}53%,99%{opacity:0}100%{opacity:1}}
@keyframes e17{0%,55%{opacity:1}56%,99%{opacity:0}100%{opacity:1}}
@keyframes e18{0%,58%{opacity:1}59%,99%{opacity:0}100%{opacity:1}}
@keyframes e19{0%,61%{opacity:1}62%,99%{opacity:0}100%{opacity:1}}
@keyframes e20{0%,64%{opacity:1}65%,99%{opacity:0}100%{opacity:1}}
@keyframes e21{0%,66%{opacity:1}67%,99%{opacity:0}100%{opacity:1}}
@keyframes e22{0%,69%{opacity:1}70%,99%{opacity:0}100%{opacity:1}}
@keyframes e23{0%,72%{opacity:1}73%,99%{opacity:0}100%{opacity:1}}
@keyframes e24{0%,75%{opacity:1}76%,99%{opacity:0}100%{opacity:1}}
@keyframes e25{0%,78%{opacity:1}79%,99%{opacity:0}100%{opacity:1}}
@keyframes e26{0%,81%{opacity:1}82%,99%{opacity:0}100%{opacity:1}}
@keyframes e27{0%,84%{opacity:1}85%,99%{opacity:0}100%{opacity:1}}
@keyframes e28{0%,87%{opacity:1}88%,99%{opacity:0}100%{opacity:1}}
@keyframes e29{0%,89%{opacity:1}90%,99%{opacity:0}100%{opacity:1}}
@keyframes e30{0%,92%{opacity:1}93%,99%{opacity:0}100%{opacity:1}}

@keyframes pp0 {0%,4%{opacity:1}5%,5.5%{opacity:.1}5.5%,6%{opacity:1}6.5%,99%{opacity:0}100%{opacity:1}}
@keyframes pp10{0%,33%{opacity:1}34%,34.5%{opacity:.1}34.5%,35%{opacity:1}35.5%,99%{opacity:0}100%{opacity:1}}
@keyframes pp20{0%,62%{opacity:1}63%,63.5%{opacity:.1}63.5%,64%{opacity:1}64.5%,99%{opacity:0}100%{opacity:1}}
@keyframes pp30{0%,90%{opacity:1}91%,91.5%{opacity:.1}91.5%,92%{opacity:1}92.5%,99%{opacity:0}100%{opacity:1}}

@keyframes sfx{0%,91%{opacity:0}93%,97%{opacity:1}99%{opacity:0}100%{opacity:0}}

@keyframes ttl{0%,68%,100%{opacity:1}75%{opacity:.1}80%{opacity:.9}87%{opacity:.1}93%{opacity:1}}
.ttl{animation:ttl 5s ease-in-out infinite}

@keyframes dotblink{0%,45%{opacity:1}50%{opacity:.2}55%{opacity:1}}
.pb{animation:dotblink 1.2s ease-in-out infinite}

@keyframes scared{0%,64%{fill:#1a1aff;opacity:1}65%,67%{fill:#ffffff}67%,69%{fill:#1a1aff}69%,72%{fill:#ffffff}72%,99%{fill:#1a1aff}100%{fill:#1a1aff}}
.gs{animation:scared 8s linear infinite}
</style>
</defs>

<rect width="760" height="200" fill="#000011" rx="12"/>

<!-- Maze outer border -->
<rect x="5" y="5" width="750" height="190" fill="none" stroke="#2121de" stroke-width="3" rx="8"/>
<!-- Top divider -->
<line x1="5" y1="54" x2="755" y2="54" stroke="#2121de" stroke-width="2" opacity=".55"/>
<!-- Bottom divider -->
<line x1="5" y1="146" x2="755" y2="146" stroke="#2121de" stroke-width="2" opacity=".55"/>
<!-- Center ghost house (decorative) -->
<rect x="330" y="82" width="100" height="36" fill="none" stroke="#ff69b4" stroke-width="1.5" rx="3" opacity=".5"/>
<line x1="355" y1="82" x2="355" y2="118" stroke="#ff69b4" stroke-width="1" opacity=".4"/>
<line x1="380" y1="82" x2="380" y2="118" stroke="#ff69b4" stroke-width="1" opacity=".4"/>
<line x1="405" y1="82" x2="405" y2="118" stroke="#ff69b4" stroke-width="1" opacity=".4"/>

<!-- Decorative maze pillars -->
<rect x="22" y="62" width="5" height="16" fill="#2121de" rx="1" opacity=".7"/>
<rect x="22" y="122" width="5" height="16" fill="#2121de" rx="1" opacity=".7"/>
<rect x="733" y="62" width="5" height="16" fill="#2121de" rx="1" opacity=".7"/>
<rect x="733" y="122" width="5" height="16" fill="#2121de" rx="1" opacity=".7"/>
<rect x="155" y="62" width="5" height="16" fill="#2121de" rx="1" opacity=".5"/>
<rect x="600" y="62" width="5" height="16" fill="#2121de" rx="1" opacity=".5"/>
<rect x="155" y="122" width="5" height="16" fill="#2121de" rx="1" opacity=".5"/>
<rect x="600" y="122" width="5" height="16" fill="#2121de" rx="1" opacity=".5"/>

<!-- Title -->
<text x="380" y="33" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="11" letter-spacing="4" class="ttl">◈  PAC-MAN  GRID  PROTOCOL  ◈</text>

<!-- Score displays -->
<text x="30"  y="46" fill="#cccccc" font-family="monospace" font-size="9">1UP</text>
<text x="30"  y="53" fill="#FFD700" font-family="monospace" font-size="9" font-weight="bold">10800</text>
<text x="380" y="46" text-anchor="middle" fill="#cccccc" font-family="monospace" font-size="9">HIGH SCORE</text>
<text x="380" y="53" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="9" font-weight="bold">36000</text>

<!-- Score pop (200pts flash when power pellet eaten) -->
<text x="220" y="88" text-anchor="middle" fill="#00ffff" font-family="monospace" font-size="10" font-weight="bold" style="animation:sfx 8s linear infinite">200</text>

<!-- Lives display -->
<text x="30" y="188" fill="#cccccc" font-family="monospace" font-size="8">LIVES</text>
<g transform="translate(70,181)">
  <circle cx="0" cy="0" r="7" fill="#FFD700"/>
  <polygon points="0,0 8,-5 8,0" fill="#000011"/>
  <polygon points="0,0 8,5 8,0" fill="#000011"/>
</g>
<g transform="translate(88,181)">
  <circle cx="0" cy="0" r="7" fill="#FFD700"/>
  <polygon points="0,0 8,-5 8,0" fill="#000011"/>
  <polygon points="0,0 8,5 8,0" fill="#000011"/>
</g>
<g transform="translate(106,181)">
  <circle cx="0" cy="0" r="7" fill="#FFD700"/>
  <polygon points="0,0 8,-5 8,0" fill="#000011"/>
  <polygon points="0,0 8,5 8,0" fill="#000011"/>
</g>

<!-- Level indicator -->
<text x="730" y="188" text-anchor="end" fill="#cccccc" font-family="monospace" font-size="8">LEVEL  01</text>

<!-- ═══════════════════════════════
     POWER PELLETS (large, blink before eaten)
     at x=40, 270, 500, 730
     ═══════════════════════════════ -->
<circle cx="40"  cy="100" r="7" fill="#ffffff" style="animation:pp0  8s linear infinite" class="pb"/>
<circle cx="270" cy="100" r="7" fill="#ffffff" style="animation:pp10 8s linear infinite" class="pb"/>
<circle cx="500" cy="100" r="7" fill="#ffffff" style="animation:pp20 8s linear infinite" class="pb"/>
<circle cx="730" cy="100" r="7" fill="#ffffff" style="animation:pp30 8s linear infinite" class="pb"/>

<!-- ═══════════════════════════════
     REGULAR DOTS (eaten left to right)
     x = 40+23*i, skipping i=0,10,20,30 (power pellets)
     ═══════════════════════════════ -->
<circle cx="63"  cy="100" r="3" fill="#ffb8ae" style="animation:e1  8s linear infinite"/>
<circle cx="86"  cy="100" r="3" fill="#ffb8ae" style="animation:e2  8s linear infinite"/>
<circle cx="109" cy="100" r="3" fill="#ffb8ae" style="animation:e3  8s linear infinite"/>
<circle cx="132" cy="100" r="3" fill="#ffb8ae" style="animation:e4  8s linear infinite"/>
<circle cx="155" cy="100" r="3" fill="#ffb8ae" style="animation:e5  8s linear infinite"/>
<circle cx="178" cy="100" r="3" fill="#ffb8ae" style="animation:e6  8s linear infinite"/>
<circle cx="201" cy="100" r="3" fill="#ffb8ae" style="animation:e7  8s linear infinite"/>
<circle cx="224" cy="100" r="3" fill="#ffb8ae" style="animation:e8  8s linear infinite"/>
<circle cx="247" cy="100" r="3" fill="#ffb8ae" style="animation:e9  8s linear infinite"/>
<circle cx="293" cy="100" r="3" fill="#ffb8ae" style="animation:e11 8s linear infinite"/>
<circle cx="316" cy="100" r="3" fill="#ffb8ae" style="animation:e12 8s linear infinite"/>
<circle cx="339" cy="100" r="3" fill="#ffb8ae" style="animation:e13 8s linear infinite"/>
<circle cx="362" cy="100" r="3" fill="#ffb8ae" style="animation:e14 8s linear infinite"/>
<circle cx="385" cy="100" r="3" fill="#ffb8ae" style="animation:e15 8s linear infinite"/>
<circle cx="408" cy="100" r="3" fill="#ffb8ae" style="animation:e16 8s linear infinite"/>
<circle cx="431" cy="100" r="3" fill="#ffb8ae" style="animation:e17 8s linear infinite"/>
<circle cx="454" cy="100" r="3" fill="#ffb8ae" style="animation:e18 8s linear infinite"/>
<circle cx="477" cy="100" r="3" fill="#ffb8ae" style="animation:e19 8s linear infinite"/>
<circle cx="523" cy="100" r="3" fill="#ffb8ae" style="animation:e21 8s linear infinite"/>
<circle cx="546" cy="100" r="3" fill="#ffb8ae" style="animation:e22 8s linear infinite"/>
<circle cx="569" cy="100" r="3" fill="#ffb8ae" style="animation:e23 8s linear infinite"/>
<circle cx="592" cy="100" r="3" fill="#ffb8ae" style="animation:e24 8s linear infinite"/>
<circle cx="615" cy="100" r="3" fill="#ffb8ae" style="animation:e25 8s linear infinite"/>
<circle cx="638" cy="100" r="3" fill="#ffb8ae" style="animation:e26 8s linear infinite"/>
<circle cx="661" cy="100" r="3" fill="#ffb8ae" style="animation:e27 8s linear infinite"/>
<circle cx="684" cy="100" r="3" fill="#ffb8ae" style="animation:e28 8s linear infinite"/>
<circle cx="707" cy="100" r="3" fill="#ffb8ae" style="animation:e29 8s linear infinite"/>

<!-- ═══════════════════════════════
     PAC-MAN — center at (0,0), group translates to y=100
     ═══════════════════════════════ -->
<g class="pg">
  <circle cx="0" cy="0" r="18" fill="#FFD700"/>
  <!-- mouth mask pieces -->
  <polygon points="0,0 22,-12 22,0" fill="#000011" class="mu"/>
  <polygon points="0,0 22,12 22,0" fill="#000011" class="md"/>
  <!-- eye -->
  <circle cx="-4" cy="-7" r="2.5" fill="#000011"/>
</g>

<!-- ═══════════════════════════════
     GHOST BODIES — all centered at (0,0), groups translate to y=100
     Arc: M -14,0 A 14,14 0 0,1 14,0 = goes UPWARD (correct head shape)
     ═══════════════════════════════ -->

<!-- BLINKY (RED) -->
<g class="ga">
  <g class="gw">
    <path d="M -14,0 A 14,14 0 0,1 14,0 L 14,16 L 10,11 L 6,16 L 2,11 L -2,16 L -6,11 L -10,16 L -14,11 Z" fill="#FF0000"/>
    <circle cx="-5" cy="-3" r="5" fill="#ffffff"/>
    <circle cx="5"  cy="-3" r="5" fill="#ffffff"/>
    <circle cx="-4" cy="-2" r="2.5" fill="#2222ff"/>
    <circle cx="6"  cy="-2" r="2.5" fill="#2222ff"/>
  </g>
</g>

<!-- PINKY (PINK) -->
<g class="gb">
  <g class="gw" style="animation-delay:-.12s">
    <path d="M -14,0 A 14,14 0 0,1 14,0 L 14,16 L 10,11 L 6,16 L 2,11 L -2,16 L -6,11 L -10,16 L -14,11 Z" fill="#FFB8FF"/>
    <circle cx="-5" cy="-3" r="5" fill="#ffffff"/>
    <circle cx="5"  cy="-3" r="5" fill="#ffffff"/>
    <circle cx="-4" cy="-2" r="2.5" fill="#2222ff"/>
    <circle cx="6"  cy="-2" r="2.5" fill="#2222ff"/>
  </g>
</g>

<!-- INKY (CYAN) -->
<g class="gc">
  <g class="gw" style="animation-delay:-.24s">
    <!-- Scared (blue/white flash) after power pellet at x=500, which happens at 64% of 8s = ~5.1s -->
    <path d="M -14,0 A 14,14 0 0,1 14,0 L 14,16 L 10,11 L 6,16 L 2,11 L -2,16 L -6,11 L -10,16 L -14,11 Z" fill="#00FFFF"/>
    <circle cx="-5" cy="-3" r="5" fill="#ffffff"/>
    <circle cx="5"  cy="-3" r="5" fill="#ffffff"/>
    <circle cx="-4" cy="-2" r="2.5" fill="#2222ff"/>
    <circle cx="6"  cy="-2" r="2.5" fill="#2222ff"/>
  </g>
</g>

<!-- CLYDE (ORANGE) -->
<g class="gd">
  <g class="gw" style="animation-delay:-.36s">
    <path d="M -14,0 A 14,14 0 0,1 14,0 L 14,16 L 10,11 L 6,16 L 2,11 L -2,16 L -6,11 L -10,16 L -14,11 Z" fill="#FFB847"/>
    <circle cx="-5" cy="-3" r="5" fill="#ffffff"/>
    <circle cx="5"  cy="-3" r="5" fill="#ffffff"/>
    <circle cx="-4" cy="-2" r="2.5" fill="#2222ff"/>
    <circle cx="6"  cy="-2" r="2.5" fill="#2222ff"/>
  </g>
</g>

<!-- Footer watermark -->
<text x="380" y="172" text-anchor="middle" fill="#2121de" font-family="monospace" font-size="8" opacity=".8">◈  PAC-MAN GRID PROTOCOL  ·  github.com/AHMADMALIK1376  ◈</text>
</svg>
