<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg" width="200" height="80">
<defs>
  <style>
    @keyframes rotateIcons {
      0%   { opacity: 0; transform: scale(0.5) rotate(0deg); }
      10%  { opacity: 1; transform: scale(1) rotate(10deg); }
      20%  { opacity: 1; transform: scale(1) rotate(0deg); }
      30%  { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      100% { opacity: 0; }
    }
    .icon { animation: rotateIcons 4.2s ease-in-out infinite; }
    .i1 { animation-delay: 0.0s; }
    .i2 { animation-delay: 0.6s; }
    .i3 { animation-delay: 1.2s; }
    .i4 { animation-delay: 1.8s; }
    .i5 { animation-delay: 2.4s; }
    .i6 { animation-delay: 3.0s; }
    .i7 { animation-delay: 3.6s; }
  </style>
</defs>

<rect width="200" height="80" fill="#0d1117" rx="8"/>

<text class="icon i1" x="28"  y="52" text-anchor="middle" font-size="32" fill="#ffffff">🤖</text>
<text class="icon i2" x="52"  y="52" text-anchor="middle" font-size="32" fill="#ffffff">👾</text>
<text class="icon i3" x="76"  y="52" text-anchor="middle" font-size="32" fill="#ffffff">🛸</text>
<text class="icon i4" x="100" y="52" text-anchor="middle" font-size="32" fill="#ffffff">⚡</text>
<text class="icon i5" x="124" y="52" text-anchor="middle" font-size="32" fill="#ffffff">🧠</text>
<text class="icon i6" x="148" y="52" text-anchor="middle" font-size="32" fill="#ffffff">👽</text>
<text class="icon i7" x="172" y="52" text-anchor="middle" font-size="32" fill="#ffffff">🤖</text>

</svg>
